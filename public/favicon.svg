    <line x1="40" y1="40" x2="60" y2="60" />
    <line x1="42" y1="45" x2="47" y2="43" />
    <line x1="46" y1="49" x2="51" y2="47" />
    <line x1="50" y1="53" x2="55" y2="51" />
    <line x1="54" y1="57" x2="59" y2="55" />
  </g>
  <!-- White stripes -->
  <path d="M32,35 C35,30 40,30 43,33" fill="none" stroke="white" stroke-width="2" />
  <path d="M57,67 C60,70 65,70 68,65" fill="none" stroke="white" stroke-width="2" />
