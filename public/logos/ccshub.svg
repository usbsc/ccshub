<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b4d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background fill -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1e3a8a" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#1e40af" stroke-width="2" opacity="0.2"/>
  
  <!-- Border -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#3b82f6" stroke-width="8" rx="20"/>
  
  <!-- Inner accent border -->
  <rect x="35" y="35" width="442" height="442" fill="none" stroke="#1e40af" stroke-width="2" rx="15"/>
  
  <!-- Main text: CCSHUB -->
  <text x="256" y="260" font-family="Arial, sans-serif" font-size="140" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="8">
    CCSHUB
  </text>
  
  <!-- Gradient text overlay -->
  <text x="256" y="260" font-family="Arial, sans-serif" font-size="140" font-weight="bold" text-anchor="middle" fill="url(#textGradient)" letter-spacing="8" opacity="0.8">
    CCSHUB
  </text>
  
  <!-- Subtitle -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="28" font-weight="normal" text-anchor="middle" fill="#60a5fa" letter-spacing="2">
    Central Coast Section
  </text>
  
  <!-- Small accent line -->
  <line x1="180" y1="370" x2="332" y2="370" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Football icon suggestion -->
  <circle cx="256" cy="420" r="25" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
</svg>
