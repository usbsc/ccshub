name: Update MaxPreps ranks

on:
  schedule:
    - cron: "15 * * * *" # hourly (UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "maxpreps-update"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUPPETEER_SKIP_DOWNLOAD: '1'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package.json

      - name: Install Chromium for Puppeteer
        run: |
          sudo apt-get update -y
          sudo apt-get install -y chromium-browser --no-install-recommends || sudo apt-get install -y chromium --no-install-recommends
          echo "PUPPETEER_EXECUTABLE_PATH=$(which chromium-browser || which chromium || which google-chrome-stable || which google-chrome || echo /usr/bin/chromium-browser)" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install

      - name: Update MaxPreps team data
        run: npm run update:maxpreps-teams

      - name: Format generated file
        run: npx prettier --write src/app/data/teams.maxpreps.generated.ts

      - name: Commit and push (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/data/teams.maxpreps.generated.ts
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update MaxPreps ranks"
          git push
